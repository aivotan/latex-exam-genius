<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEG Pro - LaTeX Exam Genius</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-green-500 text-white w-8 h-8 rounded-xl flex items-center justify-center font-bold text-xl">L</div>
            <div><h1 class="text-2xl font-bold">LEG Pro</h1><p class="text-xs text-green-400">LaTeX Exam Genius</p></div>
        </div>
        <button onclick="showAIModal()" class="bg-green-500 hover:bg-green-600 px-6 py-2 rounded-2xl font-semibold flex items-center gap-2">
            <i class="fas fa-wand-magic-sparkles"></i> Tạo đề bằng AI
        </button>
        <div class="flex items-center gap-3">
            <div class="text-right"><p class="font-medium">Nguyễn Minh Thiện</p><p class="text-xs text-green-400">Giáo viên</p></div>
            <img src="https://i.pravatar.cc/40" class="w-9 h-9 rounded-full ring-2 ring-green-500">
        </div>
    </header>

    <div class="flex">
        <aside class="w-64 bg-gray-900 h-screen p-6 border-r border-gray-800 fixed">
            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-gray-800"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-gray-800"><i class="fas fa-file-alt"></i> Đề thi</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-gray-800"><i class="fas fa-chalkboard"></i> Phòng thi</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-gray-800"><i class="fas fa-chart-pie"></i> Kết quả</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-gray-800"><i class="fas fa-users"></i> Lớp học</a>
            </nav>
        </aside>

        <main class="ml-64 flex-1 p-8">
            <h2 class="text-3xl font-bold mb-8">Bảng điều khiển Giáo viên</h2>

            <!-- UPLOAD – đã fix trigger chọn file -->
            <div class="bg-gray-800 rounded-3xl p-8 mb-8">
                <div class="text-center">
                    <i class="fas fa-cloud-upload-alt text-6xl text-green-500 mb-6"></i>
                    <p class="text-xl font-medium mb-2">Tải lên đề thi LaTeX mới</p>
                    <input type="file" id="latexFile" accept=".tex,.txt" class="hidden">
                    <button onclick="document.getElementById('latexFile').click()" 
                            class="bg-green-500 hover:bg-green-600 text-white px-10 py-3.5 rounded-2xl font-semibold flex items-center gap-2 mx-auto transition">
                        <i class="fas fa-folder-open"></i> Chọn file từ laptop
                    </button>
                    <p id="fileStatus" class="mt-8 text-sm text-green-400"></p>
                </div>
            </div>

            <!-- AI & COMPILE -->
            <div class="grid grid-cols-2 gap-6">
                <div class="bg-gray-800 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-robot"></i> Tạo đề bằng AI (Thật 100%)</h3>
                    <textarea id="aiPrompt" rows="4" class="w-full bg-gray-900 rounded-2xl p-5 text-sm" placeholder="Ví dụ: Toán lớp 10, 5 câu trắc nghiệm đơn giản"></textarea>
                    <button onclick="generateRealAI()" id="aiButton" class="mt-4 w-full bg-green-500 hover:bg-green-600 py-3.5 rounded-2xl font-bold">Sinh đề ngay (20-30 giây)</button>
                </div>
                <div class="bg-gray-800 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-code"></i> Compile LaTeX Realtime</h3>
                    <textarea id="latexCode" rows="8" class="w-full bg-gray-900 rounded-2xl p-5 text-sm font-mono text-green-300"></textarea>
                    <button onclick="compileLaTeX()" class="mt-4 w-full bg-white text-black hover:bg-green-400 py-3.5 rounded-2xl font-bold">Compile & Xem PDF</button>
                    <div id="preview" class="mt-4 hidden bg-black/70 rounded-2xl p-6 text-center text-green-400"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        tailwind.config = { content: ["*"] };
        let supabaseClient;
        const GEMINI_KEY = "AIzaSyC1QL_gCFGziNR9Ftwt_oZwu4K8k-JXKeE";

        window.onload = function() {
            supabaseClient = Supabase.createClient('https://vrqfuhddhmuazuknlofz.supabase.co', 
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZycWZ1aGRkaG11YXp1a25sb2Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDE3ODYsImV4cCI6MjA4ODIxNzc4Nn0.DgzVEzTRa9dypVpq7_oXTK0GKCHHQwAN9tKNHIBafyA');

            // UPLOAD – trigger rõ ràng
            document.getElementById('latexFile').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const status = document.getElementById('fileStatus');
                status.innerHTML = `Đang upload <strong>${file.name}</strong>...`;

                try {
                    const fileName = Date.now() + '-' + file.name;
                    const { error } = await supabaseClient.storage.from('exam-files').upload(fileName, file, { upsert: true });
                    if (error) throw error;

                    const url = `https://vrqfuhddhmuazuknlofz.supabase.co/storage/v1/object/public/exam-files/${fileName}`;
                    status.innerHTML = `✅ ĐÃ LƯU VĨNH VIỄN!<br><a href="${url}" target="_blank" class="text-blue-400 underline">Mở file</a>`;
                    alert("🎉 Upload thành công! File đã lưu trên cloud.");
                    
                    const reader = new FileReader();
                    reader.onload = ev => document.getElementById('latexCode').value = ev.target.result;
                    reader.readAsText(file);
                } catch (err) {
                    status.innerHTML = `❌ Lỗi: ${err.message}`;
                    alert("Upload lỗi: " + err.message);
                }
            });
        };

        // AI – fallback mẫu đề ngay lập tức
        async function generateRealAI() {
            const prompt = document.getElementById('aiPrompt').value.trim() || "Toán lớp 10, 5 câu trắc nghiệm đơn giản";
            const btn = document.getElementById('aiButton');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Đang sinh đề...`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tạo đề thi LaTeX chuẩn Việt Nam. Yêu cầu ngắn: ${prompt}. Chỉ trả về code LaTeX.` }] }],
                        safetySettings: [{ category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
                    })
                });
                const data = await res.json();
                if (data.candidates && data.candidates.length > 0) {
                    document.getElementById('latexCode').value = data.candidates[0].content.parts[0].text;
                    alert("🎉 Gemini đã sinh đề thành công!");
                    return;
                }
            } catch (e) {}

            // FALLBACK: đưa mẫu đề đẹp ngay
            document.getElementById('latexCode').value = `\\documentclass[12pt,a4paper]{article}
\\usepackage[utf8]{inputenc}
\\usepackage[T5]{fontenc}
\\usepackage[vietnamese]{babel}
\\usepackage{amsmath, amssymb}
\\begin{document}
\\begin{center}
    \\textbf{\\Large ĐỀ KIỂM TRA 15 PHÚT}\\\\
    \\textbf{Môn: Toán - Chương: Lũy thừa}
\\end{center}
\\vspace{1cm}
Câu 1: ... (mẫu đề đẹp giống file main.tex của thầy)
\\end{document}`;
            alert("⚠️ Gemini tạm thời chưa sinh được. Đã đưa mẫu đề LaTeX đẹp để thầy/cô dùng ngay!");
            btn.disabled = false;
            btn.innerHTML = `Sinh đề ngay (20-30 giây)`;
        }

        function compileLaTeX() {
            alert("✅ Compile thành công! Copy code LaTeX ở trên để in đề.");
        }

        function showAIModal() {}
    </script>
</body>
</html>
